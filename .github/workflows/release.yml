name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Create release from VERSION.txt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if ! version="$(awk 'NR == 1 { print; next } { exit 1 } END { if (NR != 1) exit 1 }' VERSION.txt)"; then
            echo "VERSION.txt must contain exactly one version line" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION.txt must contain a plain semantic version like 0.0.1" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
          } >> "$GITHUB_OUTPUT"

      - name: Check tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release tag ${{ steps.version.outputs.tag }} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.tag.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
